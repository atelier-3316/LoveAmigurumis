<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gracias por tu compra | León Valiente</title>
    <meta
      name="description"
      content="Descarga tu patrón PDF León Valiente de LoveAmigurumis."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800;900&family=Playfair+Display:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <main class="thank-you-page">
      <section class="thank-you-panel">
        <p class="eyebrow">LoveAmigurumis</p>
        <h1>Gracias por comprar León Valiente</h1>
        <p>
          Tu patrón PDF está listo. Guarda el archivo en tu dispositivo para tenerlo siempre a la mano.
        </p>
        <div class="thank-you-actions">
          <a id="download-pdf" class="button primary" href="../downloads/leon-valiente.pdf" target="_blank" rel="noopener">
            Descargar PDF
          </a>
          <a class="button secondary" href="../index.html#catalogo">Volver al catálogo</a>
        </div>
        <p class="thank-you-note">
          La descarga debe abrirse automáticamente. Si no pasa, toca el botón Descargar PDF.
        </p>
      </section>
    </main>
    <script>
      window.addEventListener("load", () => {
        window.setTimeout(() => {
          document.getElementById("download-pdf").click();
        }, 900);
      });
    </script>
  </body>
</html>
